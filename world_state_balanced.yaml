# ----------------------------------------------------------------------------
# Retailer Commitments — 8 standing replenishment commitments
# ----------------------------------------------------------------------------
# Key narrative commitment: COM-BUL-SEC-Q2 (Bullseye on TP-SEC-6OZ, MABD 130).
# This is the at-risk commitment when the Megalomart promo on TP-FLAG-6OZ jams
# NJ-L1. OTIF penalty = 3% × shipment value.

# OTIF terms vary by retailer relationship: MEGALOMART runs the strictest
# scorecard (98% target, 3% of COGS on non-compliant lines); BULLSEYE 95%;
# GREENFIELD 90% with a softer 2.5% rate. Each grants a $1k/mo penalty waiver
# before charges begin. These are contract terms (facts), not our decision —
# the agent weighs the resulting per-retailer exposure when it sizes a partial
# fill; the ontology never says which retailer to favour.
retailer_commitments:
  - commitment_id: COM-MGM-FLAG-Q2
    retailer: MEGALOMART
    sku: TP-FLAG-6OZ
    committed_volume: 12000
    mabd_day: 135
    otif_penalty_rate: 0.03
    otif_target: 0.98
    otif_waiver_monthly: 1000

  - commitment_id: COM-BUL-SEC-Q2
    retailer: BULLSEYE
    sku: TP-SEC-6OZ
    committed_volume: 8000
    mabd_day: 130
    otif_penalty_rate: 0.03
    otif_target: 0.95
    otif_waiver_monthly: 1000

  - commitment_id: COM-BUL-FLAG-Q2
    retailer: BULLSEYE
    sku: TP-FLAG-6OZ
    committed_volume: 5000
    mabd_day: 138
    otif_penalty_rate: 0.03
    otif_target: 0.95
    otif_waiver_monthly: 1000

  - commitment_id: COM-GRN-FLAG-Q2
    retailer: GREENFIELD
    sku: TP-FLAG-6OZ
    committed_volume: 4000
    mabd_day: 140
    otif_penalty_rate: 0.025
    otif_target: 0.90
    otif_waiver_monthly: 1000

  - commitment_id: COM-MGM-MW-Q2
    retailer: MEGALOMART
