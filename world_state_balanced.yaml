# ----------------------------------------------------------------------------
# Production Schedule — supplementary world state (no ontology class)
# ----------------------------------------------------------------------------
# Baseline weekly production keyed by (line, sku, week_start_day). These rows
# are the explicitly-modeled SKUs competing for each line's RESIDUAL (they are
# NOT the same as committed_load, which is the aggregate of the line's ~28 other
# SKUs). line_capacity_not_exceeded sums these scheduled units and the proposed
# production against the residual available (capacity_total − committed_load).
#
# Covers two weeks in the conflict window (days 140-153, the promo's production
# ramp). Without the promo, the two toothpaste SKUs use 3500 of NJ-L1's 5000
# residual (70%). With the promo on TP-FLAG-6OZ at 3x, projected load is 6500
# against the 5000 residual (130%) — the conflict that drives the demo.

production_schedule:
  # NJ-L1 — the shared toothpaste line; the canonical conflict surface
  - line: NJ-L1
    sku: TP-FLAG-6OZ
    week_start_day: 140
    units: 1500
  - line: NJ-L1
    sku: TP-SEC-6OZ
    week_start_day: 140
    units: 2000
  - line: NJ-L1
    sku: TP-FLAG-6OZ
    week_start_day: 147
    units: 1500
  - line: NJ-L1
    sku: TP-SEC-6OZ
    week_start_day: 147
    units: 2000

  # NJ-L2 — mouthwash; no interaction with the demo conflict
  - line: NJ-L2
    sku: MW-CLAS-500ML
    week_start_day: 140
    units: 1800
  - line: NJ-L2
    sku: MW-CLAS-500ML
    week_start_day: 147
    units: 1800

  # CA-L1 — alternative toothpaste capacity (relevant to internal-resequencing
  # and shift_to_coman resolution paths)
  # K1 (balanced variant): CA-L1 also runs a small baseline of the flagship
  # TP-FLAG-6OZ (400/wk), so query_plants_for_sku surfaces it as a qualified
  # alternative line for the flagship. Total CA-L1 scheduled = 1200+1500+400 =
  # 3100; against the raised 5000 residual that leaves 1900 free (>= the 1500
  # shortfall) — internal re-plan to CA-L1 is feasible on capacity.
  - line: CA-L1
    sku: TP-FLAG-6OZ
    week_start_day: 140
    units: 400
  - line: CA-L1
    sku: TPB-WHIT-4OZ
    week_start_day: 140
    units: 1200
  - line: CA-L1
    sku: TP-KIDS-3OZ
    week_start_day: 140
    units: 1500
  - line: CA-L1
    sku: TP-FLAG-6OZ
    week_start_day: 147
    units: 400
  - line: CA-L1
    sku: TPB-WHIT-4OZ
    week_start_day: 147
    units: 1200
  - line: CA-L1
    sku: TP-KIDS-3OZ
    week_start_day: 147
    units: 1500

  # CA-L2 — mouthwash
  - line: CA-L2
    sku: MW-CLAS-500ML
    week_start_day: 140
    units: 1200
  - line: CA-L2
    sku: MW-CLAS-500ML
    week_start_day: 147
    units: 1200

# ----------------------------------------------------------------------------
# Baseline Demand — instances of the BaselineDemand entity class
# ----------------------------------------------------------------------------
# The base a promo's volume_uplift_factor multiplies. Before this fixture
# existed, demand_planning had no readable baseline and invented one (report §5
# ungrounded-quantity gap): a live run sized the promo SupplyRequest at 45,000
# off a guessed ~1,000/day base. query_baseline_demand reads these rows so the
# agent multiplies a REAL run-rate by the uplift instead of estimating the base.
#
# This is an outbound-edge SHIM (design-memo-ontology-exposes-handshakes):
# the durable artifact is the query_baseline_demand scont:Tool handshake; these
# rows stand in for a real demand/forecast system behind the same contract.
#
# CONSISTENCY CONSTRAINT (load-bearing): TP-FLAG-6OZ baseline DEMAND = 1500/wk
# tracks its baseline PRODUCTION on NJ-L1 (production_schedule, week 140/147).
# A grounded demand_planning applying the 3.0x promo uplift then lands the
# incremental at 1500×3 − 1500 = 3000/wk (the stub's tuned figure), the derived
# Scene-4 conflict (6500/5000, shortfall 1500/wk) still fires, and the
# conflict-math assertions in tests/test_world_state.py stay green. Do not pick
# a number that changes the derived shortfall. Other SKUs track their own
# week-140 production baseline to keep demand and production commensurable.
baseline_demand:
  - sku: TP-FLAG-6OZ
    units_per_week: 1500
  - sku: TP-SEC-6OZ
    units_per_week: 2000
  - sku: MW-CLAS-500ML
    units_per_week: 1800
  - sku: TPB-WHIT-4OZ
    units_per_week: 1200
  - sku: TP-KIDS-3OZ
    units_per_week: 1500

# ----------------------------------------------------------------------------
# Co-manufacturer availability — instances of the ComanAvailability entity class
# ----------------------------------------------------------------------------
# The gate FACTS the query_coman_availability reader (and the check_coman_availability
# query flow) return, per SKU, for the conflict window. Co-man can no longer be a
# one-week rescue by default: the agent reads qualified_for_sku / open_window / moq
# and concludes viability per the viable_coman_shift criterion — it is NOT handed a
# pre-baked yes/no (Seed A grounding pattern, mirrored for co-man).
#
# DEMO-LOAD-BEARING: the flagship promo conflict needs ~1500 units/wk of relief on
# TP-FLAG-6OZ. The TP-FLAG-6OZ co-man is qualified but gated OUT on facts —
# open_window 1000 < 1500 needed, and moq 2000 > 1500 needed, with a 21-day lead —
# so a grounded agent correctly rejects shift_to_coman for THIS conflict. Other SKUs
# carry viable co-man so the network is believable (co-man is a real lever elsewhere,
# just not for the flagship here). These are outbound-edge SHIM rows behind the
# query_coman_availability handshake; a real co-man capacity system sits behind the
# same contract.
co_manufacturers:
  - sku: TP-FLAG-6OZ
    qualified_for_sku: true
    open_window: 1000
    moq: 2000
    premium_cost_per_unit: 0.35
    lead_time_days: 21

  - sku: TP-SEC-6OZ
    qualified_for_sku: true
    open_window: 6000
    moq: 1000
    premium_cost_per_unit: 0.22
    lead_time_days: 14

  - sku: TPB-WHIT-4OZ
    qualified_for_sku: true
    open_window: 4000
    moq: 500
    premium_cost_per_unit: 0.18
    lead_time_days: 10

  - sku: TP-KIDS-3OZ
    qualified_for_sku: true
    open_window: 3000
    moq: 1500
    premium_cost_per_unit: 0.20
    lead_time_days: 12

  - sku: MW-CLAS-500ML
    qualified_for_sku: false
    open_window: 0
    moq: 0
