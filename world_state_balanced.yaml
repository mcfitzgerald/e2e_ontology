# ============================================================================
# world_state_balanced.yaml — BALANCED VARIANT of world_state.yaml (Phase A3)
# ============================================================================
#
# DERIVED FROM world_state.yaml — identical EXCEPT for the K1 delta below.
# Purpose (seed-phase-A3-balanced-variant.md): make INTERNAL RE-PLAN a grounded,
# viable resolution lever so a live agent can choose it (exercising plant_scheduler)
# and so the resolution can VARY by seed — the canonical fixture is determinate
# (only NJ-L1 runs the flagship, and it's maxed), which is why every Phase-A live
# run correctly converged to request_promo_revision.
#
# K1 DELTA (the ONLY difference from world_state.yaml):
#   CA-L1 — the "alternative toothpaste capacity" line (PLANT-CA) — is made a
#   grounded alternative for the flagship TP-FLAG-6OZ:
#     (a) committed_load 46000 -> 45000 (available 4000 -> 5000; util 92% -> 90%),
#         so it has clear residual headroom; AND
#     (b) two small TP-FLAG-6OZ production_schedule rows (weeks 140 & 147, 400/wk)
#         so query_plants_for_sku surfaces CA-L1 as a line that CAN make the SKU
#         ("currently runs it" is the grounded capability signal).
#   After the delta: CA-L1 scheduled = TPB-WHIT 1200 + TP-KIDS 1500 + TP-FLAG 400
#   = 3100; free residual = 5000 - 3100 = 1900 >= 1500 (the shortfall) -> internal
#   re-plan to CA-L1 is genuinely feasible on capacity.
#
# Note vs. the seed: the seed suggested NJ-L2, but NJ-L2 is a MOUTHWASH line —
# putting flagship toothpaste there fails CSCO credibility. CA-L1 is already the
# toothpaste alternative (it runs TPB-WHIT + TP-KIDS), so the flagship belongs
# there. PLANT-CA's 10-day mfg lead is no blocker (today=100, window 140-146).
#
# NJ-L1's 5000-residual / 1500-shortfall invariant and the Seed-A baseline are
# UNTOUCHED. K2 (the contractually-locked promo variant) is NOT here — it is an
# orchestrator-side responder, not a fixture flip (see the seed §1).
#
# Contains:
#   - Instances of ontology entity classes (SKU, Supplier, ProductionLine,
#     RetailerCommitment, TradePromotion). Each list item is shaped to be
#     an instance of the named class from supply_chain_demo.yaml.
#   - Supplementary world state (production_schedule, clock) that the
#     orchestrator's world-state layer holds but the ontology does not model
#     as a class. See agent_system_design.md §9 ("State and transactions")
#     and plan_of_attack.md Phase 0.2.
#
# Dimensions (per plan_of_attack.md Phase 0.2):
#   2 plants × 2 lines = 4 production_lines
#   5 skus
#   3 retailers (used by commitments/promos; not modeled as a class)
#   6 suppliers
#   8 retailer_commitments
#   2 trade_promotions
#
# Conflict math (Scene 4 / line_capacity_not_exceeded) — RESIDUAL-CAPACITY model:
#   NJ-L1 is a real, loaded line running ~30 SKUs — not a one-SKU pilot cell:
#     capacity_total  = 50000   (full rated weekly throughput)
#     committed_load  = 45000   (ONE aggregate fact: ~28 other SKUs already scheduled)
#     available       =  5000   (residual = capacity_total − committed_load; 90% utilized)
#   The two toothpaste SKUs compete for that 5000-unit residual:
#   Baseline during promo window (week_start_day=140):
#     TP-FLAG-6OZ:  1500   (existing)
#     TP-SEC-6OZ:   2000   (Bullseye commitment)
#                  -----
#                   3500   (70% of the 5000 residual — fine baseline)
#   With Megalomart promo on TP-FLAG-6OZ at 3x uplift:
#     TP-FLAG-6OZ:  4500   (1500 × 3)
#     TP-SEC-6OZ:   2000
#                  -----
#                   6500   (130% of residual — CONFLICT, shortfall 1500/week)
#
# This is a representation reframe, NOT a rescale: `available` (5000) reproduces
# the old toy "rated_weekly_capacity = 5000" exactly, so the shortfall stays
# 1,500/week and the Seed-A baseline stays 1,500/week — unchanged. committed_load
# is a single aggregate FACT (modeling the ~28 other SKUs as individual claimants
# on shared capacity would be Tier-2, deferred); `available` is arithmetic over
# facts. No policy, threshold, or preference is introduced.
#
# Validation: tests/test_world_state.py validates entities against the schema
# and checks the conflict math.

# ----------------------------------------------------------------------------
# Clock — "today" expressed as integer day-of-year (1-365)
# ----------------------------------------------------------------------------
# Promo lands at day 142 (~6 weeks out from today). Time-dependent axioms
# (respect_lead_time) evaluate against this clock; demo scenarios may
# override.

clock:
  today_day_of_year: 100

# ----------------------------------------------------------------------------
# SKUs — 5 finished goods, all oral care category
# ----------------------------------------------------------------------------
# TP-FLAG-6OZ is "Product A" (the promo target; Colgate-Total-style flagship).
# TP-SEC-6OZ  is "Product B" (the SKU at risk when NJ-L1 jams).

skus:
  - sku_code: TP-FLAG-6OZ
    name: "Flagship Toothpaste 6oz"
    category: oral_care
    unit_of_measure: each
    cases_per_pallet: 48
    active: true

  - sku_code: TP-SEC-6OZ
    name: "Secondary Toothpaste 6oz"
    category: oral_care
    unit_of_measure: each
    cases_per_pallet: 48
    active: true

  - sku_code: TP-KIDS-3OZ
    name: "Kids Toothpaste 3oz"
    category: oral_care
    unit_of_measure: each
    cases_per_pallet: 60
    active: true

  - sku_code: TPB-WHIT-4OZ
    name: "Whitening Toothpaste 4oz"
    category: oral_care
    unit_of_measure: each
    cases_per_pallet: 50
    active: true

  - sku_code: MW-CLAS-500ML
    name: "Classic Mouthwash 500ml"
    category: oral_care
    unit_of_measure: each
    cases_per_pallet: 40
    active: true

# ----------------------------------------------------------------------------
# Production Lines — 2 plants (NJ, CA) × 2 lines each
# ----------------------------------------------------------------------------
# NJ-L1 is the canonical shared line where TP-FLAG-6OZ and TP-SEC-6OZ
# compete during the promo window. CA-L1 is the natural alternative
# (different plant; would require schedule re-sequencing to absorb shifted
# volume).
#
# Each line carries capacity_total (full rated weekly throughput) and
# committed_load (one aggregate fact: units already scheduled to the line's
# other SKUs in the window). Residual available = capacity_total −
# committed_load. Lines run 90–94% utilized — realistic for a loaded plant —
# so a promo eats into the last few thousand units of residual, not into an
# empty line. NJ-L1's residual (50000 − 45000 = 5000) reproduces the prior
# effective capacity exactly; the conflict and shortfall are unchanged.

production_lines:
  - line_code: NJ-L1
    plant_code: PLANT-NJ
    capacity_total: 50000      # full rated throughput
    committed_load: 45000      # ~28 other SKUs already scheduled → 90% utilized
    mfg_lead_time_days: 7
    active: true               # residual available = 5000 (the conflict surface)

  - line_code: NJ-L2
    plant_code: PLANT-NJ
    capacity_total: 50000
    committed_load: 46500      # 93% utilized → residual available = 3500
    mfg_lead_time_days: 7
    active: true

  - line_code: CA-L1
    plant_code: PLANT-CA
    capacity_total: 50000
    committed_load: 45000      # K1 (balanced variant): 92%→90% utilized → residual available = 5000
                               # (was 46000/4000) so CA-L1 has headroom to absorb the 1500 flagship shortfall
    mfg_lead_time_days: 10
    active: true

  - line_code: CA-L2
    plant_code: PLANT-CA
    capacity_total: 50000
    committed_load: 47000      # 94% utilized → residual available = 3000
    mfg_lead_time_days: 14
    active: true

