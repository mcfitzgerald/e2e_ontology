    sku: TP-FLAG-6OZ
    retailer: MEGALOMART
    volume_uplift_factor: 3.0
    promo_start_day: 142
    promo_end_day: 156
    commitment_status: aligned

  - promo_id: PROMO-BUL-WHIT-2026Q2
    sku: TPB-WHIT-4OZ
    retailer: BULLSEYE
    volume_uplift_factor: 2.0
    promo_start_day: 165
    promo_end_day: 179
