# ============================================================================
# supply_chain_demo.yaml — Minimal slice for the §10 de-risking spike
# ============================================================================
#
# This is the smallest ontology fragment that exercises the full extension
# pattern end-to-end:
#
#   - One plain entity (ProcurementRequest) — the quantum
#   - Two roles (demand_planning, procurement)
#   - One event (demand_anomaly_detected)
#   - One state machine (RequestLifecycle)
#   - One flow (submit_procurement_request) carrying the happy path
#   - One blocking axiom (respect_lead_time) attached to the flow
#
# Enough to test the three spike questions in initial_design_draft.md §10:
#   Q1. Given a candidate ProcurementRequest instance, does the axiom fire?
#   Q2. When submit_procurement_request is in 'submitted' state, what role
#       should the orchestrator route to next?
#   Q3. If the axiom fires, what flow should fire instead?  (Q3 will need
#       the recovery flow to pass — see the optional second flow below.)

id: https://e2e-ontology.dev/schemas/supply_chain_demo
name: supply_chain_demo
version: "0.1.0"
description: >-
  Minimal supply chain ontology fragment for the POC spike. Demonstrates the
  demand→procurement happy path and the disruption→replan unhappy path routed
  by a blocking axiom on the flow.

prefixes:
  linkml: https://w3id.org/linkml/
  scont:  https://e2e-ontology.dev/

default_prefix: scont
default_range: string

imports:
  - linkml:types
  - core

# ============================================================================
# CLASSES
# ============================================================================

classes:

  # --------------------------------------------------------------------------
  # Plain entity — the quantum carried by the flow. No `instantiates:`.
  # --------------------------------------------------------------------------

  ProcurementRequest:
    description: >-
      The typed payload demand planning emits to procurement in response to
      a detected demand anomaly. Moves through draft → submitted → approved.
    annotations:
      scont:domain: procurement
      scont:subdomain: sourcing
    attributes:
      triggering_signal:
        description: "Reference to the demand signal that produced this request"
        range: string
      sku:
        description: "The SKU affected by the demand signal"
        range: SKU
        required: true
      quantity:
        description: "Suggested replenishment quantity in units"
        range: decimal
        required: true
      urgency:
        description: "Routing priority"
        range: UrgencyLevel
      required_by:
        description: "Date the replenishment must be on hand (integer day 1-365)"
        range: integer
        required: true
      justification:
        description: "Free-form business rationale"
        range: string
      supplier:
        description: "Suggested supplier; resolved by procurement if null at draft"
        range: Supplier
      status:
        description: "Current state in the RequestLifecycle FSM"
        range: RequestStatus
        required: true
    rules:
      # Tier-1 native LinkML rule (see initial_design_draft.md §4.Tier-1).
      # Simple class-level invariants drop into rules:, get validated by
      # LinkML's own validator and compiled to Pydantic @validator decorators.
      - preconditions:
          slot_conditions:
            urgency:
              equals_string: critical
        postconditions:
          slot_conditions:
            justification:
              required: true
        description: >-
          Critical-urgency requests must include a written justification. A
          procurement agent receiving a critical request without rationale
          should reject it for clarification rather than escalate.

  # --------------------------------------------------------------------------
  # Supporting plain entities referenced by ProcurementRequest and axioms
  # --------------------------------------------------------------------------

  Supplier:
    description: "A raw-material or service supplier to the enterprise."
    annotations:
      scont:domain: procurement
      scont:subdomain: sourcing
      # One metric example — demonstrates the MetricFlow-compatible shape
      # described in initial_design_draft.md §5. Ontology-authoritative for
      # now, flagged for future promotion to dbt semantic layer.
      scont:metrics: >-
        [
          {
            "name": "supplier_lead_time",
            "kind": "measure",
            "entity": "Supplier",
            "aggregation": "avg",
            "expr": "lead_time_days",
            "time_grain": "day",
            "unit": "days",
            "definition": "Average commit-to-dispatch lead time (days) for the supplier.",
            "source": "local",
            "promotion_target": "dbt"
          }
        ]
    attributes:
      supplier_code:
        range: string
        required: true
      name:
        range: string
        required: true
      country:
        range: string
      lead_time_days:
        description: "Committed days from PO acknowledgment to dispatch"
        range: integer
        minimum_value: 0
        required: true
      active:
        range: boolean
        required: true

  SKU:
    description: "Stock keeping unit — a finished good or raw material."
    annotations:
      scont:domain: supply
      scont:subdomain: product
    attributes:
      sku_code:
        range: string
        required: true
      name:
        range: string
        required: true
      category:
        range: string
      unit_of_measure:
        description: "Canonical unit for quantity — case, each, kg, l"
        range: string
      active:
        range: boolean
        required: true

  PurchaseOrder:
    description: >-
      The artifact procurement produces after successfully resolving a
      ProcurementRequest. Transmitted to supplier_management for dispatch
      to an external supplier. Quantum of the submit_po_to_supplier flow.
    annotations:
      scont:domain: procurement
      scont:subdomain: purchasing
    attributes:
      po_number:
        range: string
        required: true
      supplier:
        range: Supplier
        required: true
      sku:
        range: SKU
        required: true
      quantity:
        range: decimal
        required: true
      required_by:
        description: "Date the goods must be on hand (integer day 1-365)"
        range: integer
        required: true
      total_value:
        description: "Line total — quantity × unit cost"
        range: decimal
      status:
        range: POStatus
        required: true

  # --------------------------------------------------------------------------
  # Roles — meta-typed, lightweight tag + JSON annotation
  # --------------------------------------------------------------------------

  demand_planning:
    instantiates: [scont:Role]
    annotations:
      scont:role: >-
        {
          "description": "Forecasts demand, detects anomalies, revises plans.",
          "llm_prompt_hint": "This role owns demand-side signals. When an anomaly is detected it emits a ProcurementRequest quantum to procurement via submit_procurement_request. If procurement finds the request infeasible, this role receives a ReplanRequest back and must revise the forecast or timing."
        }

  procurement:
    instantiates: [scont:Role]
    annotations:
      scont:domain: procurement
      scont:role: >-
        {
          "description": "Sources materials, drafts purchase orders, manages supplier relationships.",
          "llm_prompt_hint": "Target role for submit_procurement_request. Consumes a ProcurementRequest quantum, resolves a supplier, and drafts a PO. Must respect supplier lead times (enforced by the respect_lead_time axiom on the flow). If the axiom blocks, procurement emits a ReplanRequest back to demand_planning via replan_on_infeasible_request. On happy path, emits a po_drafted event and hands the PurchaseOrder off to supplier_management via submit_po_to_supplier."
        }

  supplier_management:
    instantiates: [scont:Role]
    annotations:
      scont:domain: procurement
      scont:role: >-
        {
          "description": "Enterprise-side interface that transmits purchase orders to external suppliers and tracks their lifecycle.",
          "llm_prompt_hint": "Target role for submit_po_to_supplier. Receives a drafted PurchaseOrder quantum from procurement and is responsible for transmission, acknowledgment tracking, and fulfillment confirmation. NOT the supplier itself — this is the role that talks TO suppliers."
        }

  # --------------------------------------------------------------------------
  # Event — what triggers the flow
  # --------------------------------------------------------------------------

  demand_anomaly_detected:
    instantiates: [scont:Event]
    annotations:
      scont:event: >-
        {
          "description": "A statistically significant departure from forecast for a SKU.",
          "observed_by": "demand_planning",
          "llm_prompt_hint": "Fires when the demand signal for a SKU deviates materially from forecast. This is the trigger for submit_procurement_request. In the POC this event is externally simulated; in production it would be emitted by an anomaly-detection component downstream of demand planning."
        }

  # --------------------------------------------------------------------------
  # State machine — the quantum's lifecycle
  # --------------------------------------------------------------------------

  RequestLifecycle:
    instantiates: [scont:StateMachine]
    annotations:
      scont:domain: procurement
      scont:state_machine: >-
        {
          "states": ["draft", "submitted", "approved", "rejected", "expired"],
          "transitions": [
            {"from": "draft",     "to": "submitted", "trigger": "submit",   "guard": null},
            {"from": "submitted", "to": "approved",  "trigger": "approve",  "guard": "respect_lead_time"},
            {"from": "submitted", "to": "rejected",  "trigger": "reject",   "guard": null},
            {"from": "submitted", "to": "expired",   "trigger": "timeout",  "guard": null}
          ],
          "initial":  "draft",
          "terminal": ["approved", "rejected", "expired"]
        }

  PurchaseOrderLifecycle:
    instantiates: [scont:StateMachine]
    annotations:
      scont:domain: procurement
      scont:state_machine: >-
        {
          "states": ["draft", "transmitted", "acknowledged", "fulfilled", "cancelled"],
          "transitions": [
            {"from": "draft",        "to": "transmitted",  "trigger": "transmit",       "guard": null},
            {"from": "transmitted",  "to": "acknowledged", "trigger": "acknowledge",    "guard": null},
            {"from": "acknowledged", "to": "fulfilled",    "trigger": "goods_received", "guard": null},
            {"from": "draft",        "to": "cancelled",    "trigger": "cancel",         "guard": null},
            {"from": "transmitted",  "to": "cancelled",    "trigger": "cancel",         "guard": null}
          ],
          "initial":  "draft",
          "terminal": ["fulfilled", "cancelled"]
        }

  # --------------------------------------------------------------------------
  # Flow — the happy path
  # --------------------------------------------------------------------------

  submit_procurement_request:
    instantiates: [scont:InformationFlow]
    annotations:
      scont:flow: >-
        {
          "source_role":   "demand_planning",
          "target_role":   "procurement",
          "quantum":       "ProcurementRequest",
          "trigger_event": "demand_anomaly_detected",
          "lifecycle_ref": "RequestLifecycle"
        }
      scont:axioms: >-
        [
          {
            "name": "respect_lead_time",
            "scope": "flow",
            "expr": "{quantum.required_by} >= today() + {quantum.supplier.lead_time}",
            "nl":   "A procurement request's required-by date must not fall inside its supplier's lead time.",
            "severity": "blocking",
            "message":  "Required-by date is inside supplier lead time",
            "references": {"metrics": ["supplier.lead_time"]},
            "on_failure_route_to": "replan_on_infeasible_request"
          }
        ]
      scont:llm_prompt_hint: >-
        Happy-path information flow from demand_planning to procurement. Fires on
        demand_anomaly_detected with a ProcurementRequest quantum. The blocking
        axiom respect_lead_time catches infeasible required-by dates and routes to
        replan_on_infeasible_request on failure — the orchestrator should read the
        axiom's on_failure_route_to field to find the recovery flow.

  # --------------------------------------------------------------------------
  # Flow — the unhappy-path recovery
  # --------------------------------------------------------------------------

  replan_on_infeasible_request:
    instantiates: [scont:InformationFlow]
    annotations:
      scont:domain: procurement
      scont:flow: >-
        {
          "source_role":   "procurement",
          "target_role":   "demand_planning",
          "quantum":       "ProcurementRequest",
          "trigger_event": "procurement_infeasible",
          "lifecycle_ref": "RequestLifecycle"
        }
      scont:llm_prompt_hint: >-
        Recovery information flow. Fires when procurement cannot satisfy a
        ProcurementRequest (typically because the respect_lead_time axiom blocked
        on submit_procurement_request). Routes the request back to demand_planning
        for revision of the forecast, timing, or quantity. Reuses the same
        ProcurementRequest quantum so the demand planning agent has full context.

  # --------------------------------------------------------------------------
  # Flow — downstream procurement → supplier_management
  # --------------------------------------------------------------------------

  submit_po_to_supplier:
    instantiates: [scont:InformationFlow]
    annotations:
      scont:domain: procurement
      scont:flow: >-
        {
          "source_role":   "procurement",
          "target_role":   "supplier_management",
          "quantum":       "PurchaseOrder",
          "trigger_event": "po_drafted",
          "lifecycle_ref": "PurchaseOrderLifecycle"
        }
      scont:llm_prompt_hint: >-
        Downstream information flow from procurement to supplier_management
        carrying a drafted PurchaseOrder. Fires after procurement successfully
        resolves a ProcurementRequest (the respect_lead_time axiom passed and the
        quantum reached the approved state). This closes the happy-path chain:
        demand_anomaly_detected → submit_procurement_request → po_drafted →
        submit_po_to_supplier. The PurchaseOrder moves through PurchaseOrderLifecycle
        as supplier_management transmits, tracks acknowledgment, and confirms
        fulfillment.

  procurement_infeasible:
    instantiates: [scont:Event]
    annotations:
      scont:domain: procurement
      scont:event: >-
        {
          "description": "Procurement determined a request cannot be satisfied as drafted — typically due to lead time, supply constraints, or budget.",
          "observed_by": "procurement",
          "llm_prompt_hint": "Emitted when a blocking axiom on submit_procurement_request fires. Triggers replan_on_infeasible_request to route back to demand_planning."
        }

  po_drafted:
    instantiates: [scont:Event]
    annotations:
      scont:domain: procurement
      scont:event: >-
        {
          "description": "Procurement has drafted a PurchaseOrder ready to transmit to a supplier.",
          "observed_by": "procurement",
          "llm_prompt_hint": "Fires after procurement successfully resolves a ProcurementRequest into a concrete PurchaseOrder — i.e. after the respect_lead_time axiom passes and the quantum reaches the approved state. Triggers submit_po_to_supplier to hand the PO off to supplier_management."
        }

# ============================================================================
# ENUMS
# ============================================================================

enums:

  UrgencyLevel:
    permissible_values:
      low:
        description: "Routine replenishment; standard lead time acceptable"
      normal:
        description: "Default routing priority"
      high:
        description: "Expedited handling requested"
      critical:
        description: "Stock-out imminent; bypass standard review"

  RequestStatus:
    permissible_values:
      draft:
      submitted:
      approved:
      rejected:
      expired:

  POStatus:
    permissible_values:
      draft:
      transmitted:
      acknowledged:
      fulfilled:
      cancelled:
