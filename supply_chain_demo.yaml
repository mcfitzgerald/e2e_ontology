# ============================================================================
# supply_chain_demo.yaml — Minimal slice for the §10 de-risking spike
# ============================================================================
#
# This is the smallest ontology fragment that exercises the full extension
# pattern end-to-end:
#
#   - One plain entity (ProcurementRequest) — the quantum
#   - Two roles (demand_planning, procurement)
#   - One event (demand_anomaly_detected)
#   - One state machine (RequestLifecycle)
#   - One flow (submit_procurement_request) carrying the happy path
#   - One blocking axiom (respect_lead_time) attached to the flow
#
# Enough to test the three spike questions in initial_design_draft.md §10:
#   Q1. Given a candidate ProcurementRequest instance, does the axiom fire?
#   Q2. When submit_procurement_request is in 'submitted' state, what role
#       should the orchestrator route to next?
#   Q3. If the axiom fires, what flow should fire instead?  (Q3 will need
#       the recovery flow to pass — see the optional second flow below.)

id: https://e2e-ontology.dev/schemas/supply_chain_demo
name: supply_chain_demo
version: "0.1.0"
description: >-
  Minimal supply chain ontology fragment for the POC spike. Demonstrates the
  demand→procurement happy path and the disruption→replan unhappy path routed
  by a blocking axiom on the flow.

prefixes:
  linkml: https://w3id.org/linkml/
  scont:  https://e2e-ontology.dev/

default_prefix: scont
default_range: string

imports:
  - linkml:types
  - core

# ============================================================================
# CLASSES
# ============================================================================

classes:

  # --------------------------------------------------------------------------
  # Plain entity — the quantum carried by the flow. No `instantiates:`.
  # --------------------------------------------------------------------------

  ProcurementRequest:
    description: >-
      The typed payload demand planning emits to procurement in response to
      a detected demand anomaly. Moves through draft → submitted → approved.
    annotations:
      scont:domain: procurement
      scont:subdomain: sourcing
    attributes:
      triggering_signal:
        description: "Reference to the demand signal that produced this request"
        range: string
      sku:
        description: "The SKU affected by the demand signal"
        range: SKU
        required: true
      quantity:
        description: "Suggested replenishment quantity in units"
        range: decimal
        required: true
      urgency:
        description: "Routing priority"
        range: UrgencyLevel
      required_by:
        description: "Date the replenishment must be on hand (integer day 1-365)"
        range: integer
        required: true
      justification:
        description: "Free-form business rationale"
        range: string
      supplier:
        description: "Suggested supplier; resolved by procurement if null at draft"
        range: Supplier
      status:
        description: "Current state in the RequestLifecycle FSM"
        range: RequestStatus
        required: true
    rules:
      # Tier-1 native LinkML rule (see initial_design_draft.md §4.Tier-1).
      # Simple class-level invariants drop into rules:, get validated by
      # LinkML's own validator and compiled to Pydantic @validator decorators.
      - preconditions:
          slot_conditions:
            urgency:
              equals_string: critical
        postconditions:
          slot_conditions:
            justification:
              required: true
        description: >-
          Critical-urgency requests must include a written justification. A
          procurement agent receiving a critical request without rationale
          should reject it for clarification rather than escalate.

  # --------------------------------------------------------------------------
  # Supporting plain entities referenced by ProcurementRequest and axioms
  # --------------------------------------------------------------------------

  Supplier:
    description: "A raw-material or service supplier to the enterprise."
    annotations:
      scont:domain: procurement
      scont:subdomain: sourcing
      # One metric example — demonstrates the MetricFlow-compatible shape
      # described in initial_design_draft.md §5. Ontology-authoritative for
      # now, flagged for future promotion to dbt semantic layer.
      scont:metrics: >-
        [
          {
            "name": "supplier_lead_time",
            "kind": "measure",
            "entity": "Supplier",
            "aggregation": "avg",
            "expr": "lead_time_days",
            "time_grain": "day",
            "unit": "days",
            "definition": "Average commit-to-dispatch lead time (days) for the supplier.",
            "source": "local",
            "promotion_target": "dbt"
          }
        ]
    attributes:
      supplier_code:
        range: string
        required: true
      name:
        range: string
        required: true
      country:
        range: string
      lead_time_days:
        description: "Committed days from PO acknowledgment to dispatch"
        range: integer
        minimum_value: 0
        required: true
      active:
        range: boolean
        required: true

  SKU:
    description: "Stock keeping unit — a finished good or raw material."
    annotations:
      scont:domain: supply
      scont:subdomain: product
    attributes:
      sku_code:
        range: string
        required: true
      name:
        range: string
        required: true
      category:
        range: string
      unit_of_measure:
        description: "Canonical unit for quantity — case, each, kg, l"
        range: string
      active:
        range: boolean
        required: true

  PurchaseOrder:
    description: >-
      The artifact procurement produces after successfully resolving a
      ProcurementRequest. Transmitted to supplier_management for dispatch
      to an external supplier. Quantum of the submit_po_to_supplier flow.
    annotations:
      scont:domain: procurement
      scont:subdomain: purchasing
    attributes:
      po_number:
        range: string
        required: true
      supplier:
        range: Supplier
        required: true
      sku:
        range: SKU
        required: true
      quantity:
        range: decimal
        required: true
      required_by:
        description: "Date the goods must be on hand (integer day 1-365)"
        range: integer
        required: true
      total_value:
        description: "Line total — quantity × unit cost"
        range: decimal
      status:
        range: POStatus
        required: true

  # --------------------------------------------------------------------------
  # Promo whiplash entities — Phase D
  # ==========================================================================
  # These entities are the quanta and supporting objects for the promo
  # whiplash cascade. Slot designs were chosen alongside the axioms and
  # flows that traverse them (see demo_narrative.md and initial_design_draft.md
  # §7). All are plain entities (no `instantiates:`).
  # --------------------------------------------------------------------------

  TradePromotion:
    description: >-
      A retailer-facing trade promotion (BOGO, discount, multi-buy, etc.)
      that enters the supply chain through S&OP alignment. Quantum of
      submit_promo_plan (customer_development → demand_planning). Downstream
      agents read `commitment_status` to determine whether promo
      renegotiation is a viable resolution path for capacity conflicts.
    annotations:
      scont:domain: commercial
      scont:subdomain: trade_promotion
    attributes:
      promo_id:
        description: "Unique promotion identifier"
        range: string
        required: true
      sku:
        description: "SKU the promo applies to"
        range: SKU
        required: true
      retailer:
        description: "Retailer name (Megalomart, Bullseye, Kroger, ...)"
        range: string
        required: true
      volume_uplift_factor:
        description: "Multiplier on baseline demand during the promo window (e.g. 3.0 for 3x)"
        range: decimal
        required: true
      promo_start_day:
        description: "Day (1-365) the promotion starts"
        range: integer
        required: true
      promo_end_day:
        description: "Day (1-365) the promotion ends"
        range: integer
        required: true
      commitment_status:
        description: "Negotiation/lifecycle status. check_promo_flexibility reads this to decide whether renegotiation is viable."
        range: CommitmentStatus
        required: true

  ProductionLine:
    description: >-
      A manufacturing line at a specific plant with a rated weekly production
      capacity. Referenced by ProductionRequest.assigned_line and read by the
      line_capacity_not_exceeded axiom during capacity checks.
    annotations:
      scont:domain: manufacturing
      scont:subdomain: capacity
    attributes:
      line_code:
        description: "Line identifier within the plant"
        range: string
        required: true
      plant_code:
        description: "Plant the line belongs to"
        range: string
        required: true
      rated_weekly_capacity:
        description: "Maximum units producible per week on this line"
        range: integer
        required: true
        minimum_value: 1
      active:
        range: boolean
        required: true

  RetailerCommitment:
    description: >-
      A standing replenishment commitment to a retailer for a given SKU,
      with must-arrive-by window and OTIF penalty rate. Referenced by
      CapacityConflict.at_risk_commitments and queried by check_otif_exposure
      to quantify financial impact of delays.
    annotations:
      scont:domain: logistics
      scont:subdomain: retailer_commitment
    attributes:
      commitment_id:
        range: string
        required: true
      retailer:
        description: "Retailer to whom this commitment is owed"
        range: string
        required: true
      sku:
        range: SKU
        required: true
      committed_volume:
        description: "Units committed for delivery"
        range: decimal
        required: true
      mabd_day:
        description: "Must-arrive-by day (1-365). Shipping later triggers OTIF penalty."
        range: integer
        required: true
      otif_penalty_rate:
        description: "Fraction of COGS charged per OTIF violation (e.g., 0.03 for 3%)"
        range: decimal
        required: true

  SupplyRequest:
    description: >-
      Revised demand signal emitted by demand_planning to supply_planning
      after a forecast revision (triggered by a promo or an anomaly).
      Supply_planning consumes this to decide where and how to fulfill.
      Quantum of submit_supply_request.
    annotations:
      scont:domain: supply_netops
      scont:subdomain: supply_request
    attributes:
      request_id:
        range: string
        required: true
      sku:
        range: SKU
        required: true
      volume:
        description: "Units needed"
        range: decimal
        required: true
      required_by:
        description: "Day (1-365) by which supply must be in position"
        range: integer
        required: true
      source_signal_ref:
        description: "Free-text reference to the upstream signal (promo_id, anomaly_id, etc.)"
        range: string

  ProductionRequest:
    description: >-
      Production assignment emitted by supply_planning to production_planning
      after network-level decision (which plant, which line). Quantum of
      request_production. The line_capacity_not_exceeded axiom traverses
      {quantum.assigned_line.rated_weekly_capacity} against total scheduled
      production for the window.
    annotations:
      scont:domain: supply_netops
      scont:subdomain: production_request
    attributes:
      request_id:
        range: string
        required: true
      sku:
        range: SKU
        required: true
      volume:
        range: decimal
        required: true
      window_start_day:
        description: "Day (1-365) the production window opens"
        range: integer
        required: true
      window_end_day:
        range: integer
        required: true
      assigned_plant:
        description: "Plant code assigned by supply_planning"
        range: string
        required: true
      assigned_line:
        description: "Specific line on the assigned plant"
        range: ProductionLine
        required: true
      status:
        range: ProductionRequestStatus
        required: true

  CapacityConflict:
    description: >-
      Structured description of a line capacity conflict emitted by
      production_planning to supply_planning via escalate_capacity_conflict.
      Carries everything supply_planning needs to begin cross-domain context
      assembly: which line, which competing SKUs, how much shortfall, which
      retailer commitments are at risk.
    annotations:
      scont:domain: manufacturing
      scont:subdomain: capacity_conflict
    attributes:
      conflict_id:
        range: string
        required: true
      line_ref:
        description: "The line where the conflict was detected"
        range: ProductionLine
        required: true
      competing_skus:
        description: "SKUs that together exceed line capacity in the window"
        range: SKU
        multivalued: true
        required: true
      shortfall_units:
        description: "Units by which scheduled production exceeds capacity"
        range: decimal
        required: true
      at_risk_commitments:
        description: "Retailer commitments that would be violated if production slips"
        range: RetailerCommitment
        multivalued: true
      window_start_day:
        range: integer
        required: true
      window_end_day:
        range: integer
        required: true

  OTIFExposure:
    description: >-
      Logistics' quantified answer to check_otif_exposure: for a given SKU,
      retailer, and delay scenario, what is the financial penalty exposure?
      Returns class of check_otif_exposure. Consumed by supply_planning
      during Scene 5 cross-domain context assembly.
    annotations:
      scont:domain: logistics
      scont:subdomain: otif
    attributes:
      retailer:
        range: string
        required: true
      sku:
        range: SKU
        required: true
      delay_days:
        description: "Assumed shipment delay relative to MABD"
        range: integer
        required: true
      affected_shipment_value:
        description: "Dollar value of shipments that would miss MABD"
        range: decimal
        required: true
      calculated_penalty:
        description: "affected_shipment_value × otif_penalty_rate"
        range: decimal
        required: true

  # --------------------------------------------------------------------------
  # Query flow quantum + response entities (Phase D8)
  # --------------------------------------------------------------------------

  OTIFQuery:
    description: >-
      Question payload carried on check_otif_exposure from supply_planning
      to logistics_planning: "if SKU X ships N days late to retailer Y,
      what is the exposure?" Quantum of check_otif_exposure (paired with
      returns: OTIFExposure).
    annotations:
      scont:domain: logistics
      scont:subdomain: otif
    attributes:
      sku:
        range: SKU
        required: true
      retailer:
        range: string
        required: true
      proposed_delay_days:
        description: "Hypothetical delay to evaluate"
        range: integer
        required: true

  PromoFlexibilityQuery:
    description: >-
      Question payload on check_promo_flexibility from supply_planning to
      customer_development: "can we shift timing or reduce volume on the
      promo?" Quantum of check_promo_flexibility (paired with returns:
      PromoFlexibility).
    annotations:
      scont:domain: commercial
      scont:subdomain: trade_promotion
    attributes:
      promo_id:
        range: string
        required: true
      proposed_change_kind:
        description: "shift_timing | reduce_volume | cancel"
        range: string
        required: true

  PromoFlexibility:
    description: >-
      Customer development's answer to check_promo_flexibility. Exposes the
      promo's commitment_status and which kinds of changes are negotiable
      given the retailer relationship. Returns class of check_promo_flexibility.
    annotations:
      scont:domain: commercial
      scont:subdomain: trade_promotion
    attributes:
      promo_id:
        range: string
        required: true
      commitment_status:
        range: CommitmentStatus
        required: true
      can_shift_timing:
        range: boolean
        required: true
      can_reduce_volume:
        range: boolean
        required: true
      notes:
        description: "Free-text context (e.g., relationship sensitivity)"
        range: string

  ComanAvailabilityQuery:
    description: >-
      Question payload on check_coman_availability from supply_planning to
      co_manufacturing: "is a qualified co-man available to produce SKU X
      volume in window Y?" Quantum of check_coman_availability (paired with
      returns: ComanAvailability).
    annotations:
      scont:domain: manufacturing
      scont:subdomain: co_manufacturing
    attributes:
      sku:
        range: SKU
        required: true
      volume:
        range: decimal
        required: true
      window_start_day:
        range: integer
        required: true
      window_end_day:
        range: integer
        required: true

  ComanAvailability:
    description: >-
      Co-manufacturing's answer to check_coman_availability. Exposes
      qualification status, capacity availability in the requested window,
      and premium cost. Returns class of check_coman_availability. A
      positive answer makes shift_to_coman a viable resolution path.
    annotations:
      scont:domain: manufacturing
      scont:subdomain: co_manufacturing
    attributes:
      sku:
        range: SKU
        required: true
      is_qualified:
        description: "True if this co-man is already qualified for the SKU"
        range: boolean
        required: true
      has_capacity:
        description: "True if the co-man can accept the volume in the requested window"
        range: boolean
        required: true
      premium_cost_per_unit:
        description: "Incremental cost above internal production, per unit"
        range: decimal
      lead_time_days:
        description: "Days from shift_to_coman acceptance to first output"
        range: integer

  DemandAnomaly:
    description: >-
      Structured payload describing a detected departure of realized or
      incoming demand from forecast for a SKU. Quantum of raise_demand_anomaly
      (demand_sensing → demand_planning). Carries enough context for
      demand_planning to decide whether to revise the forecast and how
      urgently. Symmetric to TradePromotion as an ingress quantum.
    annotations:
      scont:domain: demand
      scont:subdomain: anomaly
    attributes:
      anomaly_id:
        range: string
        required: true
      sku:
        range: SKU
        required: true
      detected_day:
        description: "Day (1-365) the anomaly was detected"
        range: integer
        required: true
      departure_units:
        description: "Signed units the realized/incoming demand deviates from forecast (positive = higher than forecast)"
        range: decimal
        required: true
      severity_score:
        description: "Detector confidence / magnitude score (0.0-1.0). Consumers decide their own thresholds."
        range: decimal
      source_system:
        description: "Free-form identifier for the detector (POS stream, retailer EDI, social listening, etc.)"
        range: string

  # --------------------------------------------------------------------------
  # Reader-tool query + result entities (Phase 1.8)
  # ==========================================================================
  # Minimal typed input/output shells for the four reader tools. These give
  # agents a way to read world state (plants, line load, commitments, supplier)
  # instead of inventing it — the deterministic counter to the hallucinated-
  # grounding pattern Phase 3 surfaced. Slot shapes are kept to exactly what
  # the orchestrator's reader implementation needs. All plain entities.
  # --------------------------------------------------------------------------

  PlantQuery:
    description: >-
      Input to query_plants_for_sku: which production lines can make this SKU?
    annotations:
      scont:domain: supply_netops
      scont:subdomain: capacity
    attributes:
      sku:
        description: "SKU to find capable production lines for"
        range: SKU
        required: true

  PlantQueryResult:
    description: >-
      Output of query_plants_for_sku: the production lines (plant + line +
      rated capacity) that can produce the requested SKU, from world state.
    annotations:
      scont:domain: supply_netops
      scont:subdomain: capacity
    attributes:
      lines:
        description: "Production lines capable of producing the SKU"
        range: ProductionLine
        multivalued: true

  LineLoadQuery:
    description: >-
      Input to query_line_load: how much production is already scheduled on a
      (plant, line) across a window?
    annotations:
      scont:domain: supply_netops
      scont:subdomain: capacity
    attributes:
      plant_code:
        description: "Plant the line belongs to"
        range: string
        required: true
      line_code:
        description: "Line within the plant to read load for"
        range: string
        required: true
      window_start_day:
        description: "Day (1-365) the window opens"
        range: integer
        required: true
      window_end_day:
        description: "Day (1-365) the window closes"
        range: integer
        required: true

  LineLoad:
    description: >-
      Output of query_line_load: scheduled production load on a (plant, line)
      for the requested window, from the world-state production schedule.
    annotations:
      scont:domain: supply_netops
      scont:subdomain: capacity
    attributes:
      plant_code:
        description: "Plant the line belongs to"
        range: string
        required: true
      line_code:
        description: "Line the load is reported for"
        range: string
        required: true
      window_start_day:
        description: "Day (1-365) the window opens"
        range: integer
        required: true
      window_end_day:
        description: "Day (1-365) the window closes"
        range: integer
        required: true
      scheduled_units:
        description: "Units already scheduled on the line across the window"
        range: decimal
        required: true

  CommitmentQuery:
    description: >-
      Input to query_commitments_in_window: which retailer commitments touch a
      (sku, retailer, window)?
    annotations:
      scont:domain: logistics
      scont:subdomain: retailer_commitment
    attributes:
      sku:
        description: "SKU whose commitments to read"
        range: SKU
        required: true
      retailer:
        description: "Optional retailer filter; omit to match all retailers"
        range: string
      window_start_day:
        description: "Day (1-365) the window opens"
        range: integer
        required: true
      window_end_day:
        description: "Day (1-365) the window closes"
        range: integer
        required: true

  CommitmentQueryResult:
    description: >-
      Output of query_commitments_in_window: the retailer commitments matching
      the query, from world state.
    annotations:
      scont:domain: logistics
      scont:subdomain: retailer_commitment
    attributes:
      commitments:
        description: "Retailer commitments touching the queried window"
        range: RetailerCommitment
        multivalued: true

  SupplierQuery:
    description: >-
      Input to query_supplier_for_sku: which supplier provides raw materials
      for this SKU? The output is the Supplier entity (with lead time).
    annotations:
      scont:domain: procurement
      scont:subdomain: sourcing
    attributes:
      sku:
        description: "SKU whose raw-material supplier to resolve"
        range: SKU
        required: true

  # --------------------------------------------------------------------------
  # Roles — meta-typed, lightweight tag + JSON annotation
  # --------------------------------------------------------------------------

  demand_sensing:
    instantiates: [scont:Role]
    annotations:
      scont:domain: demand
      scont:role: >-
        {
          "description": "Boundary role representing external demand-anomaly detection — POS streams, retailer EDI feeds, social listening, competitor signals, etc. Not modeled internally; the ontology treats it as the upstream source of DemandAnomaly quanta.",
          "llm_prompt_hint": "Signals ENTER the supply chain from here as DemandAnomaly quanta via raise_demand_anomaly. Symmetric to customer_development: a boundary role whose role is to originate external signals into the orchestration envelope. Agents should treat demand_sensing outputs as facts-from-outside, not operations to orchestrate. In production, this stands in for an anomaly-detection pipeline; in the POC it is externally simulated.",
          "is_boundary": true
        }

  demand_planning:
    instantiates: [scont:Role]
    annotations:
      scont:domain: demand
      scont:role: >-
        {
          "description": "Forecasts demand, detects anomalies, revises plans.",
          "llm_prompt_hint": "This role owns demand-side signals. On a demand_anomaly_detected event (or an aligned promo plan) it revises the forecast and emits a SupplyRequest to supply_planning — it does NOT drive procurement directly. When supply_planning signals that a request cannot be satisfied it may re-engage this role for forecast / timing / quantity revision."
        }

  procurement:
    instantiates: [scont:Role]
    annotations:
      scont:domain: procurement
      scont:role: >-
        {
          "description": "Sources materials, drafts purchase orders, manages supplier relationships.",
          "llm_prompt_hint": "Target role for submit_procurement_request. Consumes a ProcurementRequest quantum emitted by supply_planning (after it decides where to fulfill), resolves a supplier, and drafts a PO. Must respect supplier lead times (enforced by the respect_lead_time axiom on the flow). If the axiom blocks, procurement emits a replan back to supply_planning via replan_on_infeasible_request — supply_planning owns the trade-off and may re-engage demand_planning. On happy path, emits a po_drafted event and hands the PurchaseOrder off to supplier_management via submit_po_to_supplier."
        }

  supplier_management:
    instantiates: [scont:Role]
    annotations:
      scont:domain: procurement
      scont:role: >-
        {
          "description": "Enterprise-side interface that transmits purchase orders to external suppliers and tracks their lifecycle.",
          "llm_prompt_hint": "Target role for submit_po_to_supplier. Receives a drafted PurchaseOrder quantum from procurement and is responsible for transmission, acknowledgment tracking, and fulfillment confirmation. NOT the supplier itself — this is the role that talks TO suppliers."
        }

  supply_planning:
    instantiates: [scont:Role]
    annotations:
      scont:domain: supply_netops
      scont:role: >-
        {
          "description": "Network-level planning function with cross-plant / cross-co-man / cross-DC visibility. Mediates between demand and execution: decides where and how to fulfill, assigns production to plants, and is the hub for cross-domain conflict resolution.",
          "llm_prompt_hint": "Receives SupplyRequest from demand_planning and fans out to procurement (raw materials) and production_planning (capacity). When manufacturing escalates a capacity conflict, this role assembles cross-domain context (OTIF exposure from logistics, promo flexibility from commercial, co-man availability) and either resolves autonomously or surfaces the decision to a human — see initial_design_draft.md §3.7 for the autonomy envelope. Trade-off reasoning happens here, not in the orchestrator.",
          "human_involvement": "conditional"
        }

  production_planning:
    instantiates: [scont:Role]
    annotations:
      scont:domain: manufacturing
      scont:role: >-
        {
          "description": "Owns plant line schedules and executes assigned production. Checks line capacity against requested volume, sequences jobs, and emits capacity_conflict_detected when total demand exceeds rated capacity.",
          "llm_prompt_hint": "Target role for request_production. Reads ProductionRequest.assigned_line and checks it against the line's rated_weekly_capacity for the requested window (the line_capacity_not_exceeded axiom). On capacity shortfall, emits a CapacityConflict via escalate_capacity_conflict back to supply_planning — does NOT attempt to resolve trade-offs locally. On happy path, the production proceeds and ProductionRequestLifecycle advances."
        }

  logistics_planning:
    instantiates: [scont:Role]
    annotations:
      scont:domain: logistics
      scont:role: >-
        {
          "description": "Owns warehousing, transportation, and delivery compliance (OTIF). Calculates penalty exposure for at-risk retailer commitments and plans fulfillment after supply_planning makes a resolution decision.",
          "llm_prompt_hint": "Participates in two patterns. (1) Query pattern: receives check_otif_exposure from supply_planning and returns an OTIFExposure describing the penalty impact if a SKU ships N days late. (2) Handoff pattern: receives plan_fulfillment after a resolution is chosen and updates the distribution plan to reflect split sourcing or revised timing. Knows the retailer MABD windows and OTIF penalty rates; this is where financial exposure gets quantified for cross-domain trade-off reasoning."
        }

  customer_development:
    instantiates: [scont:Role]
    annotations:
      scont:domain: commercial
      scont:role: >-
        {
          "description": "Boundary role representing the commercial / customer development function that negotiates trade promotions with retailers. External to the supply chain; the ontology does not model its internals.",
          "llm_prompt_hint": "Signals ENTER the supply chain from here: a TradePromotion aligned through S&OP arrives via submit_promo_plan, addressed to demand_planning. Can receive request_promo_revision when supply_planning asks for timing or volume changes (resolution path), and responds to check_promo_flexibility queries by exposing the TradePromotion.commitment_status field. Because this role is a boundary role, agents should treat its actions as coming from outside the orchestration envelope and plan commitment-level negotiation, not workflow orchestration.",
          "is_boundary": true
        }

  co_manufacturing:
    instantiates: [scont:Role]
    annotations:
      scont:domain: manufacturing
      scont:role: >-
        {
          "description": "Boundary role representing an external contract manufacturer qualified to produce specific SKUs on demand. External to the supply chain; the ontology does not model its internals.",
          "llm_prompt_hint": "Receives volume shifts when supply_planning routes production out of internal plants via shift_to_coman — typically to protect another SKU's commitments when internal line capacity is exceeded. Responds to check_coman_availability queries with availability + premium-cost estimates. Treat as external: qualification status, lead times for onboarding, and commercial terms are outside the ontology's modeling scope.",
          "is_boundary": true
        }

  # --------------------------------------------------------------------------
  # Event — what triggers the flow
  # --------------------------------------------------------------------------

  demand_anomaly_detected:
    instantiates: [scont:Event]
    annotations:
      scont:domain: demand
      scont:event: >-
        {
          "description": "A statistically significant departure from forecast for a SKU.",
          "observed_by": "demand_planning",
          "llm_prompt_hint": "Fires when the demand signal for a SKU deviates materially from forecast. Consumed by demand_planning to kick off forecast revision, which may in turn emit a SupplyRequest to supply_planning. In the POC this event is externally simulated; in production it would be emitted by an anomaly-detection component downstream of demand planning."
        }

  production_assigned:
    instantiates: [scont:Event]
    annotations:
      scont:domain: supply_netops
      scont:event: >-
        {
          "description": "Supply planning has assigned production for a SKU to a specific plant/line and triggered the downstream procurement and production flows.",
          "observed_by": "supply_planning",
          "llm_prompt_hint": "Emitted by supply_planning once it has decided where to fulfill. Triggers submit_procurement_request (raw materials) and future request_production (capacity). This is the 'all procurement goes through supply/netops' handoff point."
        }

  # --------------------------------------------------------------------------
  # State machine — the quantum's lifecycle
  # --------------------------------------------------------------------------

  RequestLifecycle:
    instantiates: [scont:StateMachine]
    annotations:
      scont:domain: procurement
      scont:state_machine: >-
        {
          "states": ["draft", "submitted", "approved", "rejected", "expired"],
          "transitions": [
            {"from_state": "draft",     "to_state": "submitted", "trigger": "submit",   "guard": null},
            {"from_state": "submitted", "to_state": "approved",  "trigger": "approve",  "guard": "respect_lead_time"},
            {"from_state": "submitted", "to_state": "rejected",  "trigger": "reject",   "guard": null},
            {"from_state": "submitted", "to_state": "expired",   "trigger": "timeout",  "guard": null}
          ],
          "initial":  "draft",
          "terminal": ["approved", "rejected", "expired"]
        }

  PurchaseOrderLifecycle:
    instantiates: [scont:StateMachine]
    annotations:
      scont:domain: procurement
      scont:state_machine: >-
        {
          "states": ["draft", "transmitted", "acknowledged", "fulfilled", "cancelled"],
          "transitions": [
            {"from_state": "draft",        "to_state": "transmitted",  "trigger": "transmit",       "guard": null},
            {"from_state": "transmitted",  "to_state": "acknowledged", "trigger": "acknowledge",    "guard": null},
            {"from_state": "acknowledged", "to_state": "fulfilled",    "trigger": "goods_received", "guard": null},
            {"from_state": "draft",        "to_state": "cancelled",    "trigger": "cancel",         "guard": null},
            {"from_state": "transmitted",  "to_state": "cancelled",    "trigger": "cancel",         "guard": null}
          ],
          "initial":  "draft",
          "terminal": ["fulfilled", "cancelled"]
        }

  ProductionRequestLifecycle:
    instantiates: [scont:StateMachine]
    annotations:
      scont:domain: manufacturing
      scont:state_machine: >-
        {
          "states": ["requested", "assigned", "scheduled", "in_production", "completed", "cancelled"],
          "transitions": [
            {"from_state": "requested",     "to_state": "assigned",      "trigger": "assign",         "guard": "line_capacity_not_exceeded"},
            {"from_state": "assigned",      "to_state": "scheduled",     "trigger": "schedule",       "guard": null},
            {"from_state": "scheduled",     "to_state": "in_production", "trigger": "start",          "guard": null},
            {"from_state": "in_production", "to_state": "completed",     "trigger": "finish",         "guard": null},
            {"from_state": "requested",     "to_state": "cancelled",     "trigger": "cancel",         "guard": null},
            {"from_state": "assigned",      "to_state": "cancelled",     "trigger": "cancel",         "guard": null},
            {"from_state": "scheduled",     "to_state": "cancelled",     "trigger": "cancel",         "guard": null}
          ],
          "initial":  "requested",
          "terminal": ["completed", "cancelled"]
        }

  TradePromotionLifecycle:
    instantiates: [scont:StateMachine]
    annotations:
      scont:domain: commercial
      scont:state_machine: >-
        {
          "states": ["proposed", "aligned", "committed", "executing", "completed", "revised", "cancelled"],
          "transitions": [
            {"from_state": "proposed",  "to_state": "aligned",   "trigger": "sop_align",   "guard": null},
            {"from_state": "aligned",   "to_state": "committed", "trigger": "commit",      "guard": null},
            {"from_state": "committed", "to_state": "executing", "trigger": "launch",      "guard": null},
            {"from_state": "executing", "to_state": "completed", "trigger": "end",         "guard": null},
            {"from_state": "aligned",   "to_state": "revised",   "trigger": "renegotiate", "guard": null},
            {"from_state": "committed", "to_state": "revised",   "trigger": "renegotiate", "guard": null},
            {"from_state": "revised",   "to_state": "aligned",   "trigger": "re_align",    "guard": null},
            {"from_state": "proposed",  "to_state": "cancelled", "trigger": "cancel",      "guard": null},
            {"from_state": "aligned",   "to_state": "cancelled", "trigger": "cancel",      "guard": null},
            {"from_state": "committed", "to_state": "cancelled", "trigger": "cancel",      "guard": null}
          ],
          "initial":  "proposed",
          "terminal": ["completed", "cancelled"]
        }

  # --------------------------------------------------------------------------
  # Flow — the happy path
  # --------------------------------------------------------------------------

  submit_procurement_request:
    instantiates: [scont:InformationFlow]
    annotations:
      scont:domain: procurement
      scont:flow: >-
        {
          "source_role":   "supply_planning",
          "target_role":   "procurement",
          "quantum":       "ProcurementRequest",
          "trigger_event": "production_assigned",
          "lifecycle_ref": "RequestLifecycle"
        }
      scont:axioms: >-
        [
          {
            "name": "respect_lead_time",
            "scope": "flow",
            "expr": "{quantum.required_by} >= today() + {quantum.supplier.lead_time_days}",
            "tool_ref": "evaluate_respect_lead_time",
            "nl":   "A procurement request's required-by date must not fall inside its supplier's lead time.",
            "severity": "blocking",
            "message":  "Required-by date is inside supplier lead time",
            "references": {"metrics": ["supplier_lead_time"]},
            "on_failure_route_to": "replan_on_infeasible_request"
          }
        ]
      scont:llm_prompt_hint: >-
        Handoff flow from supply_planning to procurement, carrying a
        ProcurementRequest quantum. Fires on production_assigned after
        supply_planning has decided where to fulfill. This is the "all procurement
        goes through supply/netops" path — demand_planning no longer emits this
        directly. The blocking axiom respect_lead_time catches infeasible
        required-by dates and routes to replan_on_infeasible_request on failure;
        the orchestrator should read the axiom's on_failure_route_to field to
        find the recovery flow.

  # --------------------------------------------------------------------------
  # Flow — the unhappy-path recovery
  # --------------------------------------------------------------------------

  replan_on_infeasible_request:
    instantiates: [scont:InformationFlow]
    annotations:
      scont:domain: procurement
      scont:flow: >-
        {
          "source_role":   "procurement",
          "target_role":   "supply_planning",
          "quantum":       "ProcurementRequest",
          "trigger_event": "procurement_infeasible",
          "lifecycle_ref": "RequestLifecycle"
        }
      scont:llm_prompt_hint: >-
        Recovery information flow. Fires when procurement cannot satisfy a
        ProcurementRequest (typically because the respect_lead_time axiom blocked
        on submit_procurement_request). Routes the request back to supply_planning,
        which owns the cross-domain trade-off — it may re-engage demand_planning to
        revise timing, shift sourcing to a different supplier, or choose another
        resolution path depending on network state. Reuses the same
        ProcurementRequest quantum so the supply planning agent has full context.

  # --------------------------------------------------------------------------
  # Flow — downstream procurement → supplier_management
  # --------------------------------------------------------------------------

  submit_po_to_supplier:
    instantiates: [scont:InformationFlow]
    annotations:
      scont:domain: procurement
      scont:flow: >-
        {
          "source_role":   "procurement",
          "target_role":   "supplier_management",
          "quantum":       "PurchaseOrder",
          "trigger_event": "po_drafted",
          "lifecycle_ref": "PurchaseOrderLifecycle"
        }
      scont:llm_prompt_hint: >-
        Downstream information flow from procurement to supplier_management
        carrying a drafted PurchaseOrder. Fires after procurement successfully
        resolves a ProcurementRequest (the respect_lead_time axiom passed and the
        quantum reached the approved state). This closes the happy-path chain:
        demand_anomaly_detected → submit_procurement_request → po_drafted →
        submit_po_to_supplier. The PurchaseOrder moves through PurchaseOrderLifecycle
        as supplier_management transmits, tracks acknowledgment, and confirms
        fulfillment.

  procurement_infeasible:
    instantiates: [scont:Event]
    annotations:
      scont:domain: procurement
      scont:event: >-
        {
          "description": "Procurement determined a request cannot be satisfied as drafted — typically due to lead time, supply constraints, or budget.",
          "observed_by": "procurement",
          "llm_prompt_hint": "Emitted when a blocking axiom on submit_procurement_request fires. Triggers replan_on_infeasible_request to route back to supply_planning, which owns the cross-domain trade-off and may re-engage demand_planning if timing or quantity need to change."
        }

  po_drafted:
    instantiates: [scont:Event]
    annotations:
      scont:domain: procurement
      scont:event: >-
        {
          "description": "Procurement has drafted a PurchaseOrder ready to transmit to a supplier.",
          "observed_by": "procurement",
          "llm_prompt_hint": "Fires after procurement successfully resolves a ProcurementRequest into a concrete PurchaseOrder — i.e. after the respect_lead_time axiom passes and the quantum reaches the approved state. Triggers submit_po_to_supplier to hand the PO off to supplier_management."
        }

  # --------------------------------------------------------------------------
  # Events — Phase E additions for the promo whiplash narrative
  # --------------------------------------------------------------------------

  promo_plan_aligned:
    instantiates: [scont:Event]
    annotations:
      scont:domain: commercial
      scont:event: >-
        {
          "description": "A trade promotion has been aligned through S&OP — commercial and supply chain agree on volume, window, and target retailer. The TradePromotion quantum is ready to enter the supply chain.",
          "observed_by": "customer_development",
          "llm_prompt_hint": "The S&OP boundary event. Emitted when commercial and supply chain complete alignment; triggers submit_promo_plan (customer_development → demand_planning) carrying the TradePromotion. This is the canonical signal-entering-the-supply-chain moment and the pattern generalizes to any external signal source (see initial_design_draft.md §3.1 boundary role pattern)."
        }

  forecast_revised:
    instantiates: [scont:Event]
    annotations:
      scont:domain: demand
      scont:event: >-
        {
          "description": "Demand_planning has updated the forecast for a SKU in response to a demand_anomaly_detected or a promo_plan_aligned signal. The revised forecast is ready to drive downstream fulfillment decisions.",
          "observed_by": "demand_planning",
          "llm_prompt_hint": "Triggers submit_supply_request from demand_planning to supply_planning. Unlike the older topology where demand_planning fanned out to procurement directly, the revised forecast now goes through supply/netops, which decides where and how to fulfill."
        }

  capacity_conflict_detected:
    instantiates: [scont:Event]
    annotations:
      scont:domain: manufacturing
      scont:event: >-
        {
          "description": "Production_planning has detected a line capacity conflict — total scheduled production on a line exceeds its rated weekly capacity for a window. The blocking line_capacity_not_exceeded axiom has fired.",
          "observed_by": "production_planning",
          "llm_prompt_hint": "Fires when the line_capacity_not_exceeded axiom blocks on request_production. Triggers escalate_capacity_conflict, carrying a CapacityConflict quantum that enumerates the competing SKUs, the shortfall, and the at-risk retailer commitments. Supply_planning consumes this as the entry point into cross-domain context assembly (see initial_design_draft.md §4 'Two reasoning modes' — Mode 2)."
        }

  capacity_resolved:
    instantiates: [scont:Event]
    annotations:
      scont:domain: supply_netops
      scont:event: >-
        {
          "description": "Supply_planning has completed cross-domain context assembly for a CapacityConflict and chosen a resolution path (shift to co-man, reduce promo volume, accept OTIF penalty, resequence internal line, etc.). Downstream execution flows can now fire.",
          "observed_by": "supply_planning",
          "llm_prompt_hint": "Pivot event between Mode 2 context assembly and Mode 1 execution. Triggers plan_fulfillment (always) to update the logistics plan, and one resolution-execution flow depending on the chosen path: shift_to_coman (external production), request_promo_revision (promo renegotiation), or re_request_production (internal resolution — resequence line, shift window, reduce volume, split across lines). The originally blocked request_production does NOT auto-retry; re-entry of internal resolutions is via re_request_production carrying a REVISED ProductionRequest. The event marks 'decision made'; which execution flow fires depends on the resolution supply_planning picked."
        }

  # --------------------------------------------------------------------------
  # Flows — Phase F: promo whiplash handoffs and query flows
  # ==========================================================================
  # F1 handoffs carry responsibility transfer between roles. F4 query flows
  # carry request-response semantics signaled by the `returns` field on the
  # flow body (see initial_design_draft.md §3.3). Together they let an agent
  # traverse the full promo whiplash cascade: S&OP entry → forecast revision
  # → network planning → capacity check → cross-domain context assembly →
  # resolution → execution.
  # --------------------------------------------------------------------------

  submit_promo_plan:
    instantiates: [scont:InformationFlow]
    annotations:
      scont:domain: commercial
      scont:flow: >-
        {
          "source_role":   "customer_development",
          "target_role":   "demand_planning",
          "quantum":       "TradePromotion",
          "trigger_event": "promo_plan_aligned",
          "lifecycle_ref": "TradePromotionLifecycle"
        }
      scont:llm_prompt_hint: >-
        Handoff flow that carries an aligned TradePromotion across the supply
        chain boundary into demand_planning. Source role customer_development
        is_boundary: true, so the orchestrator should treat the source side as
        external — negotiation rather than orchestration. Downstream, demand_planning
        incorporates the promo's volume_uplift_factor and window into a revised
        forecast and emits forecast_revised, which drives submit_supply_request.

  raise_demand_anomaly:
    instantiates: [scont:InformationFlow]
    annotations:
      scont:domain: demand
      scont:flow: >-
        {
          "source_role":   "demand_sensing",
          "target_role":   "demand_planning",
          "quantum":       "DemandAnomaly",
          "trigger_event": "demand_anomaly_detected"
        }
      scont:llm_prompt_hint: >-
        Ingress flow for demand anomalies. Symmetric to submit_promo_plan: an
        external boundary role (demand_sensing) hands a DemandAnomaly to
        demand_planning. Demand_planning decides whether to revise the forecast
        and, if so, emits forecast_revised, which drives submit_supply_request
        downstream. Source role is_boundary: true — treat the anomaly as a
        fact-from-outside, not an operation to orchestrate.

  submit_supply_request:
    instantiates: [scont:InformationFlow]
    annotations:
      scont:domain: demand
      scont:flow: >-
        {
          "source_role":   "demand_planning",
          "target_role":   "supply_planning",
          "quantum":       "SupplyRequest",
          "trigger_event": "forecast_revised"
        }
      scont:llm_prompt_hint: >-
        Handoff from demand_planning to supply_planning carrying the revised
        demand signal as a SupplyRequest. This is the topology hinge: all
        fulfillment decisions now flow through supply/netops, which chooses
        between internal production (request_production), external production
        (shift_to_coman), and procurement of raw materials (submit_procurement_request).
        No lifecycle ref — SupplyRequest is consumed in place by supply_planning's
        network-level decision logic, not tracked through a formal FSM.

  request_production:
    instantiates: [scont:InformationFlow]
    annotations:
      scont:domain: supply_netops
      scont:flow: >-
        {
          "source_role":   "supply_planning",
          "target_role":   "production_planning",
          "quantum":       "ProductionRequest",
          "trigger_event": "production_assigned",
          "lifecycle_ref": "ProductionRequestLifecycle"
        }
      scont:axioms: >-
        [
          {
            "name": "line_capacity_not_exceeded",
            "scope": "flow",
            "expr": "sum_scheduled_units({quantum.assigned_line}, {quantum.window_start_day}, {quantum.window_end_day}) + {quantum.volume} <= {quantum.assigned_line.rated_weekly_capacity}",
            "tool_ref": "evaluate_line_capacity_not_exceeded",
            "nl":   "Total scheduled production on the assigned line for the requested window must not exceed the line's rated weekly capacity.",
            "severity": "blocking",
            "message":  "Assigned line is over capacity for the requested window",
            "references": {"classes": ["ProductionLine", "ProductionRequest"], "events": ["capacity_conflict_detected"]},
            "on_failure_route_to": "escalate_capacity_conflict"
          }
        ]
      scont:llm_prompt_hint: >-
        Handoff from supply_planning to production_planning after the network-level
        decision has selected a plant and line. Carries a ProductionRequest through
        ProductionRequestLifecycle (requested → assigned → scheduled → in_production →
        completed). The blocking line_capacity_not_exceeded axiom is also the guard
        on the requested → assigned FSM transition: when it fires, the quantum does
        NOT advance to assigned and the orchestrator follows on_failure_route_to
        into escalate_capacity_conflict. capacity_conflict_detected is emitted as
        part of that escalation.

  re_request_production:
    instantiates: [scont:InformationFlow]
    annotations:
      scont:domain: supply_netops
      scont:flow: >-
        {
          "source_role":   "supply_planning",
          "target_role":   "production_planning",
          "quantum":       "ProductionRequest",
          "trigger_event": "capacity_resolved",
          "lifecycle_ref": "ProductionRequestLifecycle"
        }
      scont:llm_prompt_hint: >-
        Internal-resolution re-entry flow. Fires on capacity_resolved when
        supply_planning has chosen to keep production internal (resequenced line,
        shifted window, reduced volume, split across lines) rather than shift to
        co-man or renegotiate the promo. Carries a REVISED ProductionRequest that
        incorporates the resolution; production_planning treats it as a fresh
        assignment and re-enters ProductionRequestLifecycle at `requested`. The
        line_capacity_not_exceeded guard on the `requested → assigned` transition
        still applies via the shared lifecycle — supply_planning is expected to
        have verified feasibility during Mode 2 context assembly so the guard
        passes; if the revised plan still violates capacity, the guard fires and
        the orchestrator follows its on_failure_route_to back into
        escalate_capacity_conflict (which is a supply_planning bug). No axiom is
        declared on this flow directly because the guard lives on the FSM; the
        axiom itself is declared on request_production.

  escalate_capacity_conflict:
    instantiates: [scont:InformationFlow]
    annotations:
      scont:domain: manufacturing
      scont:flow: >-
        {
          "source_role":   "production_planning",
          "target_role":   "supply_planning",
          "quantum":       "CapacityConflict",
          "trigger_event": "capacity_conflict_detected"
        }
      scont:llm_prompt_hint: >-
        Recovery information flow. Fires when line_capacity_not_exceeded blocks on
        request_production. Production_planning does NOT try to resolve the conflict
        locally; it packages the competing SKUs, the shortfall, and the at-risk
        RetailerCommitments into a CapacityConflict quantum and hands off to
        supply_planning. Supply_planning is the hub for cross-domain resolution: it
        fans out query flows (check_otif_exposure, check_promo_flexibility,
        check_coman_availability) to assemble context, then fires capacity_resolved
        once a path is chosen. See initial_design_draft.md §4 Mode 2.

  shift_to_coman:
    instantiates: [scont:InformationFlow]
    annotations:
      scont:domain: manufacturing
      scont:flow: >-
        {
          "source_role":   "supply_planning",
          "target_role":   "co_manufacturing",
          "quantum":       "ProductionRequest",
          "trigger_event": "capacity_resolved",
          "lifecycle_ref": "ProductionRequestLifecycle"
        }
      scont:llm_prompt_hint: >-
        Boundary-crossing handoff: supply_planning routes a ProductionRequest to an
        external co-manufacturer when internal capacity can't absorb the volume.
        Target role co_manufacturing is_boundary: true — the orchestrator treats
        the receiving side as external. Fires only when the resolution chosen after
        capacity_resolved is 'external production' (as opposed to promo renegotiation
        or OTIF absorption). The quantum continues through ProductionRequestLifecycle
        from outside the internal plant, with lifecycle state updates treated as
        external signals crossing back in.

  plan_fulfillment:
    instantiates: [scont:InformationFlow]
    annotations:
      scont:domain: logistics
      scont:flow: >-
        {
          "source_role":   "supply_planning",
          "target_role":   "logistics_planning",
          "quantum":       "SupplyRequest",
          "trigger_event": "capacity_resolved"
        }
      scont:llm_prompt_hint: >-
        Handoff from supply_planning to logistics_planning after a resolution path
        is chosen. Logistics updates the distribution plan (split sourcing, revised
        timing, coman-origin shipments) to reflect the new supply picture. Always
        fires on capacity_resolved, regardless of which resolution path was picked —
        logistics needs the revised plan either way. Reuses the SupplyRequest
        quantum so the logistics agent has the same demand signal supply_planning
        started from.

  request_promo_revision:
    instantiates: [scont:InformationFlow]
    annotations:
      scont:domain: commercial
      scont:flow: >-
        {
          "source_role":   "supply_planning",
          "target_role":   "customer_development",
          "quantum":       "TradePromotion",
          "lifecycle_ref": "TradePromotionLifecycle"
        }
      scont:llm_prompt_hint: >-
        Skeletal resolution path used when supply_planning concludes the cheapest
        fix is to shrink or reschedule the promo itself. Hands a TradePromotion back
        across the boundary to customer_development for renegotiation — this is NOT
        an orchestrator-executable operation, it signals a commercial commitment to
        open with the retailer. Success depends on TradePromotion.commitment_status
        (proposed/aligned are negotiable; committed requires formal renegotiation;
        contractually_locked closes this path). No trigger_event: this flow fires
        as a judgment call by supply_planning's agent during Mode 2 context assembly,
        not on a deterministic event.

  # --------------------------------------------------------------------------
  # Query flows (Phase F4) — request-response. `returns:` declares response shape.
  # --------------------------------------------------------------------------

  check_otif_exposure:
    instantiates: [scont:InformationFlow]
    annotations:
      scont:domain: logistics
      scont:flow: >-
        {
          "source_role":   "supply_planning",
          "target_role":   "logistics_planning",
          "quantum":       "OTIFQuery",
          "returns":       "OTIFExposure"
        }
      scont:axioms: >-
        [
          {
            "name": "tolerable_otif_penalty",
            "scope": "flow",
            "nl": "OTIF penalty exposure is a quantified input to the capacity-conflict trade-off, not a gate. This criterion surfaces the calculated penalty (OTIFExposure.calculated_penalty) and the affected shipment value so the agent can weigh accepting the delay against the cost of the alternative resolution paths. The ontology declares no threshold above which a penalty becomes intolerable — that judgment, and the line above which a human is engaged, belong to the agent and the orchestrator's policy, not the world model.",
            "severity": "advisory",
            "references": {"classes": ["OTIFExposure", "RetailerCommitment"]}
          }
        ]
      scont:llm_prompt_hint: >-
        Query flow fired by supply_planning during Mode 2 context assembly after a
        CapacityConflict lands. Asks logistics_planning to quantify financial
        exposure if a given SKU ships a given number of days late to a given
        retailer. `returns: OTIFExposure` is the machine-validatable signal that
        this is request-response; the agent should wait for the response before
        choosing a resolution path. No trigger_event because this is ad-hoc during
        cross-domain reasoning. Complements check_promo_flexibility and
        check_coman_availability as the three canonical context-assembly queries.

  check_promo_flexibility:
    instantiates: [scont:InformationFlow]
    annotations:
      scont:domain: commercial
      scont:flow: >-
        {
          "source_role":   "supply_planning",
          "target_role":   "customer_development",
          "quantum":       "PromoFlexibilityQuery",
          "returns":       "PromoFlexibility"
        }
      scont:axioms: >-
        [
          {
            "name": "viable_promo_renegotiation",
            "scope": "flow",
            "nl": "Promo renegotiation (request_promo_revision) is a structurally viable resolution path only when the trade promotion's commitment_status is still negotiable — proposed or aligned are openly negotiable; committed requires formal renegotiation; contractually_locked closes the path. Viability also requires that at least one of the requested change kinds is permitted: PromoFlexibility.can_shift_timing or can_reduce_volume must be true. This criterion reports whether the path is open, not whether it should be preferred over the alternatives.",
            "severity": "advisory",
            "references": {"classes": ["PromoFlexibility", "TradePromotion"]}
          }
        ]
      scont:llm_prompt_hint: >-
        Boundary-crossing query flow. Supply_planning asks customer_development
        whether a trade promotion can be shifted, reduced, or cancelled. Target role
        is_boundary: true — the response is a read on retailer-relationship
        sensitivity plus the promo's commitment_status, not a commitment to act.
        `returns: PromoFlexibility` signals request-response semantics. Used during
        Mode 2 context assembly to decide whether request_promo_revision is a
        viable resolution path for a CapacityConflict.

  check_coman_availability:
    instantiates: [scont:InformationFlow]
    annotations:
      scont:domain: manufacturing
      scont:flow: >-
        {
          "source_role":   "supply_planning",
          "target_role":   "co_manufacturing",
          "quantum":       "ComanAvailabilityQuery",
          "returns":       "ComanAvailability"
        }
      scont:axioms: >-
        [
          {
            "name": "viable_coman_shift",
            "scope": "flow",
            "nl": "Shifting production to a co-manufacturer (shift_to_coman) is a structurally viable resolution path only when a qualified co-man has capacity in the requested window — ComanAvailability.is_qualified AND has_capacity must both be true. An unqualified co-man or one without window capacity closes the path. The premium cost (premium_cost_per_unit) is an input the agent weighs against the other paths; this criterion reports availability, not whether paying the premium is the right call.",
            "severity": "advisory",
            "references": {"classes": ["ComanAvailability"]}
          }
        ]
      scont:llm_prompt_hint: >-
        Boundary-crossing query flow. Supply_planning asks co_manufacturing whether
        a qualified external line has capacity in the requested window, and at what
        premium. Target role is_boundary: true. `returns: ComanAvailability`. Used
        during Mode 2 context assembly to decide whether shift_to_coman is a viable
        resolution path for a CapacityConflict. A positive ComanAvailability (is_qualified
        AND has_capacity) unlocks shift_to_coman as an execution option.

  # --------------------------------------------------------------------------
  # Playbook (Phase 1.8) — the Scene 5 cross-domain conflict-resolution scaffold
  # ==========================================================================
  # Anchors the Mode 2 choreography to (supply_planning, capacity_conflict_detected).
  # Declares the queries to fan out, the advisory criteria relevant to the
  # choice, and the resolution paths available. It does NOT declare which path
  # to prefer, in what order, or what to do at the margin — those remain agentic
  # (see agent_system_design.md §2 and §6.1). The Phase 5 stop condition: if
  # Scene 5 stops producing different resolutions across LLM seeds, agency has
  # been structured away and this playbook must be revisited against §2.
  #
  # selects_one_of and context_assembly list order is authoring convenience
  # only — the renderer neutralizes (alphabetizes) the lists, and the primer
  # states the rule. A reader who treats top-of-list as preferred has
  # reintroduced policy.
  # --------------------------------------------------------------------------

  resolve_capacity_conflict:
    instantiates: [scont:Playbook]
    annotations:
      scont:domain: supply_netops
      scont:playbook: >-
        {
          "role": "supply_planning",
          "triggered_by": "capacity_conflict_detected",
          "input_quantum": "CapacityConflict",
          "context_assembly": [
            { "flow": "check_otif_exposure",      "required": true },
            { "flow": "check_promo_flexibility",  "required": true },
            { "flow": "check_coman_availability", "required": true }
          ],
          "synchronization": "wait_all",
          "decision": {
            "criteria_refs": [
              "viable_promo_renegotiation",
              "viable_coman_shift",
              "tolerable_otif_penalty"
            ],
            "selects_one_of": [
              "request_promo_revision",
              "re_request_production",
              "shift_to_coman"
            ]
          },
          "always_fires": [
            { "event": "capacity_resolved" },
            { "flow":  "plan_fulfillment" }
          ]
        }
      scont:llm_prompt_hint: >-
        Cross-domain conflict resolution. The three context-assembly queries
        gather typed evidence from logistics (OTIF exposure), commercial (promo
        flexibility), and external co-manufacturing (availability + premium).
        The decision is yours — weigh the three advisory criteria against the
        assembled responses and pick one resolution path. The listed order of
        the paths is not a ranking. The orchestrator surfaces the decision to a
        human per its human_involvement policy on supply_planning.

  # --------------------------------------------------------------------------
  # Tools (Phase 1.8) — four reader tools over world state
  # ==========================================================================
  # Reader tools give agents a deterministic way to read world state (which
  # plants make a SKU, current line load, commitments in a window, the supplier
  # for a SKU) instead of inventing it. `implementation` is a contract name the
  # orchestrator binds to a Python callable at boot — it does not resolve to
  # anything in the ontology. `available_to` is the capability surface the
  # role-view renderer filters on. This Tool registry is separate from the
  # axiom `tool_ref` registry (agent-callable vs. internal evaluators);
  # unifying them is a deferred §12 open question.
  # --------------------------------------------------------------------------

  query_plants_for_sku:
    instantiates: [scont:Tool]
    annotations:
      scont:domain: supply_netops
      scont:tool: >-
        {
          "description": "Returns the production lines (plant + line + capacity) that can produce the given SKU, based on world state.",
          "category": "reader",
          "input_class":  "PlantQuery",
          "output_class": "PlantQueryResult",
          "implementation": "query_plants_for_sku",
          "deterministic": true,
          "available_to": ["supply_planning"]
        }
      scont:llm_prompt_hint: >-
        Use before assigning production: read which lines can actually make the
        SKU rather than guessing plant/line codes. Pairs with query_line_load to
        check whether a candidate line has room in the window.

  query_line_load:
    instantiates: [scont:Tool]
    annotations:
      scont:domain: supply_netops
      scont:tool: >-
        {
          "description": "Returns scheduled production load on a (plant, line) for a window, from the world-state production schedule.",
          "category": "reader",
          "input_class":  "LineLoadQuery",
          "output_class": "LineLoad",
          "implementation": "query_line_load",
          "deterministic": true,
          "available_to": ["supply_planning", "production_planning"]
        }
      scont:llm_prompt_hint: >-
        Read current scheduled load before proposing or re-proposing production
        on a line. The line_capacity_not_exceeded axiom evaluates the same
        world-state schedule deterministically; this tool lets the agent check
        feasibility up front so the guard passes on first try.

  query_commitments_in_window:
    instantiates: [scont:Tool]
    annotations:
      scont:domain: logistics
      scont:tool: >-
        {
          "description": "Returns retailer commitments touching a (sku, retailer, window).",
          "category": "reader",
          "input_class":  "CommitmentQuery",
          "output_class": "CommitmentQueryResult",
          "implementation": "query_commitments_in_window",
          "deterministic": true,
          "available_to": ["supply_planning", "logistics_planning"]
        }
      scont:llm_prompt_hint: >-
        Read the real retailer commitments at risk in a window rather than
        inferring them. Feeds the OTIF exposure reasoning during Mode 2 context
        assembly.

  query_supplier_for_sku:
    instantiates: [scont:Tool]
    annotations:
      scont:domain: procurement
      scont:tool: >-
        {
          "description": "Returns the supplier (with lead time) that provides raw materials for the given SKU.",
          "category": "reader",
          "input_class":  "SupplierQuery",
          "output_class": "Supplier",
          "implementation": "query_supplier_for_sku",
          "deterministic": true,
          "available_to": ["supply_planning", "procurement"]
        }
      scont:llm_prompt_hint: >-
        Read the actual supplier and its committed lead time before drafting a
        ProcurementRequest. The respect_lead_time axiom evaluates against this
        same lead time; reading it up front keeps required-by dates feasible.

# ============================================================================
# ENUMS
# ============================================================================

enums:

  UrgencyLevel:
    permissible_values:
      low:
        description: "Routine replenishment; standard lead time acceptable"
      normal:
        description: "Default routing priority"
      high:
        description: "Expedited handling requested"
      critical:
        description: "Stock-out imminent; bypass standard review"

  RequestStatus:
    permissible_values:
      draft:
      submitted:
      approved:
      rejected:
      expired:

  POStatus:
    permissible_values:
      draft:
      transmitted:
      acknowledged:
      fulfilled:
      cancelled:

  CommitmentStatus:
    description: >-
      Lifecycle and negotiation status for a TradePromotion. Read by
      check_promo_flexibility to determine whether promo renegotiation is a
      valid resolution path for downstream capacity conflicts.
    permissible_values:
      proposed:
        description: "Commercial is exploring with the retailer; not yet aligned through S&OP."
      aligned:
        description: "S&OP alignment complete; supply chain has accepted the promo plan but not yet committed."
      committed:
        description: "Commercial and supply chain have both committed; changes require formal renegotiation."
      contractually_locked:
        description: "Changes are not possible without material commercial consequences; renegotiation is off the table."

  ProductionRequestStatus:
    description: "Lifecycle state of a ProductionRequest within ProductionRequestLifecycle."
    permissible_values:
      requested:
        description: "Supply_planning has emitted the request; production_planning has not yet confirmed."
      assigned:
        description: "Production_planning has accepted; line and sequence assigned."
      scheduled:
        description: "Firmly on the line schedule."
      in_production:
        description: "Production is actively running."
      completed:
        description: "Units produced, ready for downstream fulfillment."
      cancelled:
        description: "Cancelled before or during production."
